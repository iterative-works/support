# PURPOSE: Publish workflow that runs tests and publishes artifacts to Maven repositories on main branch pushes and version tags.
# PURPOSE: Publishes to GitHub Packages on every push to main (snapshots) and additionally to e-BS Nexus on version tag pushes (releases).

name: Publish

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Coursier dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/coursier
          key: ${{ runner.os }}-coursier-${{ hashFiles('build.mill') }}
          restore-keys: |
            ${{ runner.os }}-coursier-

      - name: Cache Mill
        uses: actions/cache@v4
        with:
          path: ~/.cache/mill
          key: ${{ runner.os }}-mill-${{ hashFiles('.mill-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Run tests
        env:
          COURSIER_CREDENTIALS: maven.pkg.github.com ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}
        run: ./mill __.test

      - name: Probe GitHub Packages auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          echo "=== probe 1: default content-type (urlencoded, what curl uses with --data) ==="
          curl -sS -o /tmp/r1 -w "HTTP %{http_code}\n" \
            -u "${{ github.actor }}:$GH_TOKEN" \
            -X PUT --data "test" \
            "https://maven.pkg.github.com/iterative-works/support/probe/ct1/0.0.0/ct1-0.0.0.txt"
          cat /tmp/r1; echo

          echo "=== probe 2: Content-Type: application/binary (what mill sends) ==="
          curl -sS -o /tmp/r2 -w "HTTP %{http_code}\n" \
            -u "${{ github.actor }}:$GH_TOKEN" \
            -X PUT -H "Content-Type: application/binary" --data "test" \
            "https://maven.pkg.github.com/iterative-works/support/probe/ct2/0.0.0/ct2-0.0.0.txt"
          cat /tmp/r2; echo

          echo "=== probe 3: Content-Type: application/octet-stream (standard) ==="
          curl -sS -o /tmp/r3 -w "HTTP %{http_code}\n" \
            -u "${{ github.actor }}:$GH_TOKEN" \
            -X PUT -H "Content-Type: application/octet-stream" --data "test" \
            "https://maven.pkg.github.com/iterative-works/support/probe/ct3/0.0.0/ct3-0.0.0.txt"
          cat /tmp/r3; echo

      - name: Publish to GitHub Packages
        env:
          IW_PUBLISH_RELEASE_URI: https://maven.pkg.github.com/iterative-works/support
          IW_PUBLISH_SNAPSHOT_URI: https://maven.pkg.github.com/iterative-works/support
          MILL_SONATYPE_USERNAME: ${{ github.actor }}
          MILL_SONATYPE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          COURSIER_CREDENTIALS: maven.pkg.github.com ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}
        run: ./mill __.publish

      - name: Publish to e-BS Nexus
        if: github.ref_type == 'tag'
        env:
          IW_PUBLISH_RELEASE_URI: https://nexus.e-bs.cz/repository/maven-releases/
          IW_PUBLISH_SNAPSHOT_URI: https://nexus.e-bs.cz/repository/maven-snapshots/
          MILL_SONATYPE_USERNAME: ${{ secrets.EBS_NEXUS_USERNAME }}
          MILL_SONATYPE_PASSWORD: ${{ secrets.EBS_NEXUS_PASSWORD }}
          COURSIER_CREDENTIALS: maven.pkg.github.com ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}
        run: ./mill __.publish
