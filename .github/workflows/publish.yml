# PURPOSE: Publish workflow that runs tests and publishes artifacts to Maven repositories on main branch pushes and version tags.
# PURPOSE: Publishes to GitHub Packages on every push to main (snapshots) and additionally to e-BS Nexus on version tag pushes (releases).

name: Publish

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Coursier dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/coursier
          key: ${{ runner.os }}-coursier-${{ hashFiles('build.mill') }}
          restore-keys: |
            ${{ runner.os }}-coursier-

      - name: Cache Mill
        uses: actions/cache@v4
        with:
          path: ~/.cache/mill
          key: ${{ runner.os }}-mill-${{ hashFiles('.mill-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Run tests
        env:
          COURSIER_CREDENTIALS: maven.pkg.github.com ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}
        run: ./mill __.test

      - name: Publish to GitHub Packages
        env:
          MILL_MAVEN_USERNAME: ${{ github.actor }}
          MILL_MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          COURSIER_CREDENTIALS: maven.pkg.github.com ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}
        run: |
          ./mill mill.javalib.MavenPublishModule/publishAll \
            --publishArtifacts __:PublishModule.publishArtifacts \
            --releaseUri https://maven.pkg.github.com/iterative-works/support \
            --snapshotUri https://maven.pkg.github.com/iterative-works/support

      - name: Publish to e-BS Nexus
        if: always() && github.ref_type == 'tag'
        env:
          IW_PUBLISH_RELEASE_URI: https://nexus.e-bs.cz/repository/maven-releases/
          IW_PUBLISH_SNAPSHOT_URI: https://nexus.e-bs.cz/repository/maven-snapshots/
          MILL_SONATYPE_USERNAME: ${{ secrets.EBS_NEXUS_USERNAME }}
          MILL_SONATYPE_PASSWORD: ${{ secrets.EBS_NEXUS_PASSWORD }}
          COURSIER_CREDENTIALS: maven.pkg.github.com ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}
        run: ./mill __.publish
